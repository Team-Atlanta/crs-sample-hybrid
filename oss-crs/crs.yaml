name: crs-sample-hybrid
type:
  - bug-finding
version: 1.0.0
docker_registry: ghcr.io/team-atlanta/crs-sample-hybrid

# No prepare_phase: the run image is built FROM the target image so it inherits
# the target runtime; Node + Claude Code + libCRS are layered in at build time.

target_build_phase:
  - name: default-build
    dockerfile: oss-crs/builder.Dockerfile
    outputs:
      - build
      - src

crs_run_phase:
  # Single orchestrator service: runs the fuzzer + Claude, verifies and
  # deduplicates their candidate crashes, and submits unique POVs.
  orchestrator:
    dockerfile: oss-crs/orchestrator.Dockerfile
    additional_env:
      # Default values. Override via additional_env in the compose yaml.
      CRS_AGENT: claude_code
      ANTHROPIC_MODEL: claude-opus-4-6
      # CLAUDE_CODE_CLI_VERSION: "2.1.168"   # Optional CLI pin (build arg)
      # HYBRID_ENABLE_FUZZER: "1"            # 0 to disable the fuzzer
      # HYBRID_ENABLE_CLAUDE: "1"            # 0 to disable the Claude agent
      # HYBRID_ALLOW_TIMEOUT_BUG: "0"        # 1 to treat hangs as bugs
      # HYBRID_FUZZER_RSS_MB: "2560"
      # HYBRID_VERIFY_TIMEOUT: "90"          # per-candidate verify budget (s)
      # AGENT_TIMEOUT: "0"                    # Claude budget (s); 0 = no limit

supported_target:
  mode:
    - full
    - delta
  language:
    - c
    - c++
    - jvm
  sanitizer:
    - address
  architecture:
    - x86_64

required_llms:
  - claude-opus-4-6
